<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Raisa & Sara's Personal Collection</title>

    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- Background Decoration -->
    <div class="bg-pattern"></div>

    <!-- Header -->
    <header class="header">

        <h1>📚 Raisa & Sara's Personal Collection</h1>

        <p>Radhanagar, Pabna-6600</p>

    </header>

    <!-- Controls -->
    <section class="controls">

        <!-- Search -->
        <div class="search-box">

            <input type="text"
                   id="searchInput"
                   placeholder="Search by book name...">

        </div>

        <!-- Filter -->
        <div class="filter-box">

            <select id="authorFilter">

                <option value="all">All Authors</option>

            </select>

        </div>

    </section>

    <!-- Books Grid -->
    <main class="books-grid" id="booksGrid"></main>

    <!-- Modal -->
    <div class="modal" id="bookModal">

        <div class="modal-content">

            <span class="close-btn" id="closeBtn">&times;</span>

            <img id="modalImage" src="" alt="Book Cover">

            <div class="modal-details">

                <h2 id="modalTitle"></h2>

                <h3 id="modalAuthor"></h3>

                <p>
                    <strong>Purchase Date:</strong>
                    <span id="modalDate"></span>
                </p>

                <p>
                    <strong>Purpose:</strong>
                    <span id="modalPurpose"></span>
                </p>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
