<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Explore Raisa & Sara's curated personal book collection." />
    <meta name="theme-color" content="#0a192f" />
    
    <title>Raisa & Sara's Personal Library</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <link rel="stylesheet" href="style.css" />

    <script defer src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.2/color-thief.min.js"></script>
    <script defer src="script.js"></script>
</head>
<body class="theme-starry">

    <div class="cursor-glow" aria-hidden="true"></div>
    <div id="tsparticles" aria-hidden="true"></div>
    <div class="bg-pattern" aria-hidden="true"></div>
    <div class="aurora" aria-hidden="true"></div>

    <nav class="navbar" role="navigation">
        <div class="nav-logo">
            <i class="fa-solid fa-book-open-reader"></i>
            Raisa & Sara's Personal Library
        </div>

        <div class="nav-right">
            <button id="favoritesToggle" class="theme-btn fav-nav-btn" aria-label="Show Favorites">
                <i class="fa-solid fa-heart"></i>
            </button>
            <button id="themeToggle" class="theme-btn" aria-label="Toggle Theme">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>
    </nav>

    <div class="container">
        <header class="header">
            <div class="header-glossy-box">
                <h2 class="sparkle-text" id="mainTitle">
                    <i class="fa-solid fa-book-open-reader"></i>
                    Raisa & Sara's Personal Library
                </h2>
                <p class="highlight-location">
                    <i class="fa-solid fa-location-dot"></i> Radhanagar, Pabna-6600
                </p>
            </div>
        </header>

        <section class="controls" aria-label="Book filtering controls">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass search-icon" aria-hidden="true"></i>
                <input type="text" id="searchInput" placeholder="Search by book name or author..." autocomplete="off">
            </div>

            <div class="filter-box">
                <i class="fa-solid fa-user-pen filter-icon" aria-hidden="true"></i>
                <select id="authorFilter" aria-label="Filter by Author">
                    <option value="all">All Authors</option>
                </select>
            </div>

            <div class="filter-box">
                <i class="fa-solid fa-layer-group filter-icon" aria-hidden="true"></i>
                <select id="genreFilter" aria-label="Filter by Genre">
                    <option value="all">All Genres</option>
                </select>
            </div>
        </section>

        <main class="books-grid" id="booksGrid" aria-live="polite"></main>

        <nav class="pagination" id="pagination" aria-label="Pagination"></nav>
    </div>

    <footer class="footer">
        <div class="footer-content">
            <i class="fa-solid fa-layer-group"></i> Total Enlisted Books: 
            <span id="totalBooksCount" style="font-weight: 600; color: var(--gold);">0</span>
        </div>
    </footer>

    <div class="modal" id="bookModal" role="dialog" aria-modal="true">
        <div class="modal-content">
            <button class="close-btn" id="closeBtn" aria-label="Close modal">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <div class="modal-body">
                <div class="modal-image-container">
                    <img id="modalImage" src="" alt="Book Cover Image">
                </div>
                <div class="modal-details">
                    <h2 id="modalTitle">Book Title</h2>
                    <h3 id="modalAuthor" class="author-name">
                        <i class="fa-solid fa-pen-nib"></i> Author Name
                    </h3>
                    <div class="info-group" style="margin-top: 25px; line-height: 1.8;">
                        <p>
                            <strong style="color: var(--gold);">
                                <i class="fa-solid fa-calendar-days"></i> Purchase Date:
                            </strong> 
                            <span id="modalDate" style="color: var(--text-dim);"></span>
                        </p>
                        <p style="margin-top: 15px;">
                            <strong style="color: var(--gold);">
                                <i class="fa-solid fa-bullseye"></i> Purpose:
                            </strong> 
                            <span id="modalPurpose" style="color: var(--text-dim); display: block; margin-top: 5px;"></span>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
